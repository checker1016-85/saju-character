// ================================================================
// 일주+성별 기반 직업 리스트 생성 (최대 10개)
// ================================================================
function getJobList(il, g) {
  const ch = il[0];
  const gKey = g === '남' ? '남' : '녀';
  const iu = getIljuUnique(il);
  const gt = getGenderTraits(ch, gKey);

  // 1) 천간×성별 직업방향 (시트10)
  const chJobs = (gt['직업방향'] || '').split(/[,，]/).map(s => s.trim()).filter(Boolean);

  // 2) 일지십성 직업방향
  const ss = iu['일지십성'] || '';
  const ssJobs = (SS_JOB[ss] || '').split(/[,，]/).map(s => s.trim()).filter(Boolean);

  // 중복 제거하면서 순서 유지 (천간 직업 우선)
  const seen = new Set();
  const result = [];
  for (const j of [...chJobs, ...ssJobs]) {
    if (!seen.has(j)) { seen.add(j); result.push(j); }
  }
  return result.slice(0, 10);
}

}

// ================================================================
// DB 헬퍼 — DNA 데이터 가져오기 (공통 + 성별 병합)
// ================================================================
function getDNA(ilju, gender) {
  const d = DB.dna[ilju];
  if (!d) return {};
  const com = d.common || {};
  const gen = gender === '남' ? (d.male || {}) : (d.female || {});
  // 성별 데이터가 있으면 성별 우선, 없으면 공통 폴백
  const merged = {...com};
  for (const k in gen) {
    if (gen[k]) merged[k] = gen[k];
  }
  return merged;
}

// 공통 DNA만
function getDNACommon(ilju) {
  return (DB.dna[ilju] || {}).common || {};
}

// 성별 DNA만 (오버라이드용)
function getDNAGender(ilju, gender) {
  const d = DB.dna[ilju];
  if (!d) return {};
  return gender === '남' ? (d.male || {}) : (d.female || {});
}

// 천간별 성별 특성 (시트10)
function getGenderTraits(ch, gender) {
  return DB.gender_traits[ch + '_' + gender] || {};
}

// 일주 고유 특성 (시트11)
function getIljuUnique(ilju) {
  return DB.ilju_unique[ilju] || {};
}

// ================================================================
// 프롬프트 생성 — 웹 AI용 (설명형)
// ================================================================
function genWebAI(il, g, w, job) {
  const ch = il[0], ji = il[1];
  const oh = OH_MAP[ch], yy = YY_MAP[ch];
  const gkr = g === '남' ? '남성' : '여성';

  // DNA 데이터 (공통 + 성별 병합)
  const dna = getDNA(il, g);
  const dnaG = getDNAGender(il, g);
  const dnaC = getDNACommon(il);
  const gt = getGenderTraits(ch, g === '남' ? '남' : '녀');
  const iu = getIljuUnique(il);

  let t = `아래 설정을 기반으로 **일본 소년만화 스타일**(나루토, 주술회전 화풍)의 캐릭터 일러스트를 그려주세요.\n\n`;

  // ─── 기본 정보 ───
  t += `■ 기본 정보\n`;
  t += `- 일주: ${il} (${KR_CH[ch]}${KR_JI[ji]}) | 오행: ${oh}(${yy}) | 12운성: ${iu['십이운성']||''} | 일지십성: ${iu['일지십성']||''}\n`;
  t += `- 성별: ${gkr}\n`;
  if (iu['납음']) t += `- 납음: ${iu['납음']} — ${iu['납음해석']||''}\n`;

  if (w) {
    const season = SEASON_MAP[w] || '';
    const mood = SEASON_MOOD[w] || '';
    const r = cr(ji, w);
    t += `- 월지: ${KR_JI[w]}(${w}) | 계절: ${season} | 분위기: ${mood}\n`;
    if (r.t) t += `  → 일지·월지 관계: ${r.d} — ${r.pk}\n`;
  }

  // ─── 성격·기질 (설명형) ───
  t += `\n■ 성격·기질\n`;

  // 1) 일주 고유 성격
  if (iu['고유성격']) {
    t += `【일주 고유 성격】\n${iu['고유성격']}\n\n`;
  }

  // 2) 성별 성격 분기 — 시트10(전문) 우선, DNA H1은 보조
  const personality10 = (gt['성격분기'] || '').trim();
  const personalityDNA = (dnaG['H1_표정온도'] || '').trim();
  const personalitySource = personality10.length >= personalityDNA.length ? personality10 : personalityDNA;
  if (personalitySource) {
    t += `【${gkr} 성격 특징】\n${personalitySource}\n\n`;
  }

  // 3) 분위기·존재감 — 공통이 더 풍부하면 공통 사용
  const atmoCommon = (dnaC['H2_분위기'] || '').trim();
  const atmoGender = (dnaG['H2_분위기'] || '').trim();
  const atmosphere = atmoCommon.length >= atmoGender.length ? atmoCommon : atmoGender;
  if (atmosphere) {
    t += `【분위기·존재감】\n${atmosphere}\n\n`;
  }

  // 4) 감정의 중력
  const emotion = (dna['H5_감정중력'] || '').trim();
  if (emotion) {
    t += `【감정의 중력】\n${emotion}\n\n`;
  }

  // 5) 관계 패턴
  if (gt['관계패턴']) {
    t += `【관계 패턴】\n${gt['관계패턴']}\n\n`;
  }

  // ─── 외형 상세 (설명형) ───
  t += `■ 캐릭터 외형 상세\n`;

  // 골격·체형
  const bodyDesc = (dnaG['A1_골격'] || dnaC['A1_골격'] || '').trim();
  const silhouette = (dnaG['A2_체형'] || dnaC['A2_체형'] || '').trim();
  if (bodyDesc) t += `【체형·골격】\n${bodyDesc}\n`;
  if (silhouette) t += `【실루엣·자세】\n${silhouette}\n`;

  // 얼굴
  const face = (dnaG['B1_얼굴형'] || dnaC['B1_얼굴형'] || '').trim();
  if (face) t += `【얼굴형】\n${face}\n`;

  // 눈
  const eyes = (dnaG['B2_눈'] || dnaC['B2_눈'] || '').trim();
  if (eyes) t += `【눈·눈빛】\n${eyes}\n`;

  // 이면의 눈매 (각성 시)
  const hiddenEyes = (dna['B3_이면눈매'] || '').trim();
  if (hiddenEyes) t += `【이면의 눈매(각성 시)】\n${hiddenEyes}\n`;

  // 눈썹
  const brow = (dna['B4_눈썹'] || '').trim();
  if (brow) t += `【눈썹】\n${brow}\n`;

  // 코·입
  const nose = (dna['B5_코'] || '').trim();
  const mouth = (dna['B6_입'] || '').trim();
  if (nose) t += `【코】\n${nose}\n`;
  if (mouth) t += `【입】\n${mouth}\n`;

  // 얼굴 음영
  const faceShadow = (dna['B7_얼굴음영'] || '').trim();
  if (faceShadow) t += `【얼굴 음영】\n${faceShadow}\n`;

  // 피부톤
  const skin = (dnaG['C1_피부톤'] || dnaC['C1_피부톤'] || '').trim();
  if (skin) t += `【피부톤·질감】\n${skin}\n`;

  // 헤어
  const hair = (dnaG['D1_헤어'] || dnaC['D1_헤어'] || '').trim();
  const hairPhysics = (dna['D2_머리물리'] || '').trim();
  if (hair) t += `【헤어 스타일】\n${hair}\n`;
  if (hairPhysics) t += `【머리카락 물리】\n${hairPhysics}\n`;

  // 수염 (남성)
  if (g === '남') {
    const beard = (dnaG['D3_수염'] || dnaC['D3_수염'] || '').trim();
    if (beard) t += `【수염·체모】\n${beard}\n`;
  }

  // ─── 직업·의상·스타일 ───
  if (job && job !== '기타' && JOB_PROMPT[job]) {
    t += `\n■ 직업·의상\n`;
    t += `【직업】${job}\n`;
    t += `【직업 비주얼】\n${JOB_PROMPT[job]}\n`;
    t += `※ 위 직업 비주얼을 최우선으로 반영하되, 아래 오행 기반 색감·소재를 의상에 은은히 녹여주세요.\n`;
    // 오행 색감 보조로만
    const top = (dnaG['E2_상의'] || dnaC['E2_상의'] || '').trim();
    if (top) t += `【오행 색감·소재 참고】\n${top}\n`;
  } else {
    t += `\n■ 의상·스타일\n`;
    const outfit = (dnaG['E1_의복핏'] || dnaC['E1_의복핏'] || '').trim();
    const top = (dnaG['E2_상의'] || dnaC['E2_상의'] || '').trim();
    const bottom = (dnaG['E3_하의'] || dnaC['E3_하의'] || '').trim();
    const shoes = (dnaG['E5_신발'] || dnaC['E5_신발'] || '').trim();
    if (outfit) t += `【의복·핏】\n${outfit}\n`;
    if (top) t += `【상의】\n${top}\n`;
    if (bottom) t += `【하의】\n${bottom}\n`;
    if (shoes) t += `【신발】\n${shoes}\n`;
    // 스타일 분기 (시트10)
    if (gt['스타일분기']) t += `【${gkr} 스타일 방향】\n${gt['스타일분기']}\n`;
  }

  // ─── 장신구·아이템 ───
  const headAcc = (dna['F1_머리악세'] || '').trim();
  const bodyAcc = (dna['F2_몸악세'] || '').trim();
  const weapon = (dna['F3_소울웨폰'] || '').trim();
  if (headAcc || bodyAcc || weapon) {
    t += `\n■ 장신구·아이템\n`;
    if (headAcc) t += `【머리·얼굴 악세서리】\n${headAcc}\n`;
    if (bodyAcc) t += `【몸 악세서리】\n${bodyAcc}\n`;
    if (weapon) t += `【소울 웨폰】\n${weapon}\n`;
  }

  // ─── 기운·이펙트 ───
  const aura = (dna['G1_아우라'] || '').trim();
  const effectColor = (dna['G2_이펙트컬러'] || '').trim();
  const shadow = (dna['G3_그림자'] || '').trim();
  if (aura || effectColor) {
    t += `\n■ 기운·이펙트\n`;
    if (aura) t += `【아우라·질감】\n${aura}\n`;
    if (effectColor) t += `【이펙트 컬러】\n${effectColor}\n`;
    if (shadow) t += `【그림자】\n${shadow}\n`;
  }

  // ─── 연기·포즈 ───
  t += `\n■ 표정·포즈·연출\n`;
  const exprTemp = (dnaC['H1_표정온도'] || '').trim();
  if (exprTemp) t += `【표정 온도】\n${exprTemp}\n`;
  const gesture = (dnaG['H3_제스처'] || dnaC['H3_제스처'] || '').trim();
  if (gesture) t += `【시그니처 제스처】\n${gesture}\n`;
  const voice = (dna['H4_음성톤'] || '').trim();
  if (voice) t += `【음성 톤 (분위기 참고)】\n${voice}\n`;
  const age = (dna['H7_나이대종족'] || '').trim();
  if (age) t += `【나이대·종족】\n${age}\n`;

  // ─── 월지 보정 ───
  if (w) {
    const season = SEASON_MAP[w] || '';
    const mood = SEASON_MOOD[w] || '';
    t += `\n■ 월지(${KR_JI[w]}·${w}) 보정\n`;
    t += `이 캐릭터는 ${season}(${KR_JI[w]}월) 태생입니다.\n`;
    t += `계절 분위기(${mood})를 의상 색감·조명·전체 톤에 은은히 반영하세요.\n`;
    const r = cr(ji, w);
    if (r.t === '육합') {
      t += `일지·월지가 ${r.d}으로 조화롭게 결합합니다. 안정적이고 통일된 에너지를 외형에서 느낄 수 있도록 표현하세요.\n`;
    } else if (r.t === '충') {
      t += `일지·월지가 ${r.d}으로 충돌합니다. 내면의 이중성, 긴장감을 눈빛이나 자세에 반영하세요.\n`;
    }
  }

  // ─── 규칙 ───
  t += `\n■ 반드시 지켜야 할 규칙\n`;
  t += `1. 그림 스타일: 일본 만화 현대 소년물 (선이 굵고 명확, 명암 대비 강함)\n`;
  t += `2. 배경: 순수 흰색(#FFFFFF)만. 어떤 배경 요소도 넣지 않음\n`;
  t += `3. 왼쪽 상단에 "${il}" 텍스트를 작게 표기 (캐릭터와 겹치지 않게)\n`;
  t += `4. 현대물 기준 의상. 판타지 갑옷·한복·날개·뿔 금지\n`;
  t += `5. 전신 기본 정자세. 성격에 맞는 약간의 포즈 변형 허용\n`;
  t += `6. 한 명의 캐릭터만 그릴 것`;
  return t;
}

// ================================================================
// SD/ComfyUI 프롬프트
// ================================================================
function genSD(il, g, w, job) {
  const ge = g === '남' ? 'male' : 'female';
  const oh = OH_MAP[il[0]];
  const gt = getGenderTraits(il[0], g === '남' ? '남' : '녀');
  const dnaG = getDNAGender(il, g);

  let parts = [
    'Japanese shonen manga style, modern setting, full body, standing pose',
    'pure white background',
    'bold ink outlines, detailed manga eyes, cel shading',
    `single ${ge} character`
  ];

  // 직업 키워드 (기타 제외)
  if (job && job !== '기타') {
    const JOB_EN = {경영:'CEO business suit',정치:'politician formal suit',스포츠:'athlete sportswear',군인:'military uniform soldier',건축:'architect safety vest blueprint',창업:'startup casual blazer',디자인:'designer all black minimal',교육:'teacher smart casual glasses',기획:'planner business casual',외교:'diplomat formal elegant',의료:'doctor white coat stethoscope',마케팅:'marketer trendy business',IT기획:'tech planner hoodie laptop','IT':'tech developer casual',컨설팅:'consultant luxury suit briefcase',예술:'artist paint-stained apron beret',방송:'broadcaster microphone',연예:'entertainer flashy stage outfit',뷰티:'beauty artist stylish makeup tools',강사:'lecturer mic pin presentation',연구:'researcher lab coat glasses',종교:'monk spiritual robe',전략기획:'strategist sharp suit',작가:'writer glasses notebook pen',상담:'counselor warm cardigan kind smile',간호:'nurse scrubs stethoscope',심리:'psychologist intellectual warm',행정:'administrator formal organized',부동산:'realtor business suit keys',금융:'finance trader sharp suit',토목:'civil engineer hard hat work vest',요리:'chef white double-breasted jacket toque',복지:'social worker warm casual nametag',관리:'manager clipboard organized',회계:'accountant glasses calculator',약사:'pharmacist white coat',유통:'distribution tablet inventory',영양사:'nutritionist apron healthy food',사무직:'office worker business casual desk',검사:'prosecutor black robe law book',경찰:'police uniform badge',운동선수:'athlete sports uniform muscular',보석:'jeweler loupe gemstone elegant',감정사:'appraiser magnifying glass classic suit',법조:'lawyer formal suit law book',미용:'hairstylist scissors trendy',의류:'fashion designer fabric scissors',럭셔리:'luxury premium tailored suit',무역:'trade business passport world map',탐험:'explorer outdoor gear backpack compass',여행:'traveler casual backpack camera',철학:'philosopher book deep thought',무속:'shaman spiritual accessories mystical',음악:'musician instrument headphones',플로리스트:'florist apron flower bouquet',인테리어:'interior designer color palette blueprint',이벤트:'event planner headset energetic',SNS:'influencer smartphone ring light selfie',건설:'construction worker hard hat gloves',세일즈:'salesperson business card friendly smile',프리랜서:'freelancer casual creative cafe laptop',자영업:'shop owner practical confident',투자:'investor luxury watch chart analysis',동업:'business partner handshake',공무원:'civil servant neat uniform documents',교사:'teacher chalk book warm intellectual',교수:'professor tweed jacket thick papers',의사:'doctor white coat stethoscope serious',변호사:'lawyer formal suit court gesture'};
    parts.push(JOB_EN[job] || job);
  }

  const ohStyles = {
    목:'slender tall, green/beige tones',
    화:'athletic vivid, red/orange accent',
    토:'sturdy broad, brown/khaki earth tones',
    금:'angular sharp, monochrome silver/black',
    수:'fluid graceful, navy/blue/purple tones'
  };
  parts.push(ohStyles[oh] || '');

  // 영문 외형 태그 (시트10)
  if (gt['프롬프트외형태그']) {
    parts.push(gt['프롬프트외형태그'].substring(0, 80));
  }

  // DNA 분위기 키워드 (H2에서 영문 부분 추출)
  const h2 = (dnaG['H2_분위기'] || '').trim();
  const enMatch = h2.match(/[a-zA-Z][a-zA-Z, ]+/g);
  if (enMatch) {
    parts.push(enMatch.join(', ').substring(0, 60));
  }

  if (w) {
    const seasonEn = {寅:'spring green fresh',卯:'spring vibrant',辰:'misty transition',巳:'summer warm red',午:'summer intense bright',未:'humid warm',申:'autumn cool gold',酉:'autumn silver moonlight',戌:'autumn sunset brown',亥:'winter deep navy',子:'winter midnight dark',丑:'winter dawn muted'};
    parts.push(seasonEn[w] || '');
  }

  parts.push(`small text '${il}' top left corner`, 'masterpiece, best quality, highly detailed');

  return {
    pos: parts.filter(p => p).join(', '),
    neg: 'background, scenery, multiple characters, chibi, realistic photo, 3D, watermark, fantasy armor, medieval, wings, horns, animal ears, blurry, bad anatomy, extra limbs'
  };
}

// ================================================================
// 복사
// ================================================================
function doCopy(text, btnId) {
  const btn = document.getElementById(btnId);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => ok(btn)).catch(() => fb(text, btn));
    return;
  }
  fb(text, btn);
}
function fb(text, btn) {
  const ta = document.getElementById('hc');
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0.01';
  ta.value = text; ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
  try { if (document.execCommand('copy')) ok(btn); else mn(btn); } catch(e) { mn(btn); }
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
}
function ok(btn) { if(btn){btn.textContent='✅ 복사 완료!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='📋 복사';btn.classList.remove('ok')},2000)} }
function mn(btn) { if(btn) btn.textContent='⚠ 텍스트 클릭 후 Ctrl+C'; }
function selAll(el) { el.focus(); el.select(); el.setSelectionRange(0, el.value.length); }

// UI 렌더링
// ================================================================
function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = `<div id="grid" class="grid60"></div><div id="panel"></div>
    <div class="guide">
      <strong>📖 사용법</strong><br>
      ① 일주 클릭 → 성별 선택 → (선택) 월지 선택<br>

      ③ SD/ComfyUI 사용자는 하단 토글 열어서 영문 프롬프트 복사<br>

}

function rGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  IL.forEach(il => {
    const oh = OH_MAP[il[0]];
    const b = document.createElement('button');
    b.innerHTML = `<span style="font-size:14px;font-weight:700">${il}</span><span class="sl">${KR_CH[il[0]]}${KR_JI[il[1]]}</span>`;
    b.dataset.il = il;
    b.onclick = () => { S.ilju = il; S.w = null; S.job = null; rAll(); };
    g.appendChild(b);
  });
}

function rAll() {
  document.querySelectorAll('.grid60 button').forEach(b => {
    const is = b.dataset.il === S.ilju, oh = b.dataset.il ? OH_MAP[b.dataset.il[0]] : '';
    b.style.background = is ? OC[oh] || '#333' : '#141414';
    b.style.color = is ? '#fff' : '#888';
    b.style.borderColor = is ? OC[oh] || '#555' : '#2a2a2a';
    b.style.fontWeight = is ? '800' : '500';
  });
  rPanel();
}

function rPanel() {
  const P = document.getElementById('panel');
  if (!S.ilju) { P.innerHTML = ''; return; }
  const il = S.ilju, g = S.g, w = S.w;
  const oh = OH_MAP[il[0]], oc = OC[oh];

  const wp = genWebAI(il, g, w, S.job), sd = genSD(il, g, w, S.job);

  let h = `<div class="panel">`;

  h += `<span style="font-size:12px;color:#777">${KR_CH[il[0]]}(${il[0]})+${KR_JI[il[1]]}(${il[1]})</span></div>`;

  // 뱃지
  h += `<div class="row" style="margin-bottom:10px">`;

  // 성별

  h += `<button class="gbtn ${g==='남'?'am':''}" onclick="S.g='남';S.job=null;rAll()">♂ 남</button> `;
  h += `<button class="gbtn ${g==='녀'?'af':''}" onclick="S.g='녀';S.job=null;rAll()">♀ 녀</button></div>`;

  // 월지
  h += `<div style="margin-bottom:10px"><div class="wlabel">🌙 월지 보정 (선택)</div><div class="wg">`;

  WJ_JI.forEach((k,i) => {

  });
  h += `</div></div>`;

  // 직업 선택
  const jobs = getJobList(il, g);
  h += `<div style="margin-bottom:10px"><div class="wlabel">💼 직업 선택 (선택)</div>`;
  h += `<div style="display:flex;flex-wrap:wrap;gap:3px">`;
  const noJob = !S.job;
  h += `<button class="jbtn${noJob?' jsel':''}" onclick="S.job=null;rAll()">없음</button>`;
  jobs.forEach(j => {
    const isSel = S.job === j;
    h += `<button class="jbtn${isSel?' jsel':''}" onclick="S.job='${j}';rAll()">${j}</button>`;
  });

  if (S.job && S.job !== '기타' && S.job !== null) {
    h += `<div style="margin-top:4px;font-size:10px;color:#ff9800">📌 「${S.job}」 직업 비주얼이 프롬프트에 반영됩니다.</div>`;
  } else if (S.job === '기타') {
    h += `<div style="margin-top:4px;font-size:10px;color:#888">ℹ️ 직업 비주얼 없이 오행 기반 의상만 적용됩니다.</div>`;
  }

  // 합충 표시
  if (r && r.t) { h += `<div class="rel-box ${r.t==='육합'?'rel-h':'rel-c'}">${r.t==='육합'?'🤝':'⚔️'} <strong>${r.d}</strong> — ${r.pk}</div>`; }

  h += `<textarea class="ptxt big" id="t1" onclick="selAll(this)" readonly>${wp}</textarea>`;

  // SD 토글
  h += `<div style="margin-top:4px"><button onclick="var el=document.getElementById('sdw');if(el.style.display==='none'){el.style.display='block';this.textContent='▼ SD/ComfyUI 프롬프트 닫기'}else{el.style.display='none';this.textContent='▶ SD/ComfyUI 프롬프트 열기'}" style="font-size:11px;padding:5px 14px;background:#1a1a1a;color:#888;border:1px solid #333;border-radius:3px;cursor:pointer;font-family:inherit">▶ SD/ComfyUI 프롬프트 열기</button></div>`;

  h += `<textarea class="ptxt" id="t3" onclick="selAll(this)" readonly style="min-height:50px;font-size:10px;color:#777">${sd.neg}</textarea></div></div>`;

}
